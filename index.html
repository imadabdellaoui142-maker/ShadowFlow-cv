<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--void:#08090A;--shadow:#0E1012;--charcoal:#161A1D;--graphite:#1E2327;
--border:#252A2E;--border-hi:#2E3540;
--ash:#8A9099;--fog:#C4C8CC;--ghost:#E8EAEC;
--accent:#7B9EC9;--accent-d:#5A7FA8;--accent-g:rgba(123,158,201,0.1);
--violet:#9B8FC9;--violet-g:rgba(155,143,201,0.08);
--green:#5FB88A;--red:#E2655B;--amber:#D9A857;
--serif:'Instrument Serif',Georgia,serif;
--sans:'Inter',system-ui,sans-serif;
--mono:'JetBrains Mono',monospace;
--ease:cubic-bezier(0.25,0,0.1,1);
--slow:cubic-bezier(0.16,1,0.3,1);
--nav-h:52px;
--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--void);color:var(--fog);font-family:var(--sans);-webkit-text-size-adjust:100%;overflow-x:hidden}
#root{height:100%;min-height:100%}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;-webkit-tap-highlight-color:transparent}
input,textarea,select{font-family:var(--sans)}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--void)}
::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
@media(prefers-reduced-motion:reduce){*{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
</style>

<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const {useState,useEffect,useRef,useCallback,useMemo,useLayoutEffect}=React;
const h=React.createElement;

/* ════════════════════════════════════════════════════════════
   STORAGE
════════════════════════════════════════════════════════════ */
const store={
  get:(k,fb=null)=>{try{const v=localStorage.getItem('sfcv_'+k);return v?JSON.parse(v):fb}catch{return fb}},
  set:(k,v)=>{try{localStorage.setItem('sfcv_'+k,JSON.stringify(v));return true}catch{return false}},
};

/* ════════════════════════════════════════════════════════════
   DATA MODEL
════════════════════════════════════════════════════════════ */
const blankCV=()=>({
  id:Date.now().toString(),
  name:'Untitled CV',
  template:'modern',
  updatedAt:new Date().toISOString(),
  personal:{fullName:'',title:'',email:'',phone:'',location:'',linkedin:'',website:'',summary:''},
  experience:[],
  education:[],
  skills:[],
  languages:[],
  certifications:[],
});

const TEMPLATES=[
  {id:'modern',name:'Modern',desc:'Two-column layout, accent sidebar, sans-serif throughout'},
  {id:'minimal',name:'Minimal',desc:'Single column, generous whitespace, understated serif headline'},
  {id:'executive',name:'Executive',desc:'Dark structured header, left-rule timeline, confident weight'},
  {id:'academic',name:'Academic',desc:'Centered formal header, full-width sections, citation-style spacing'},
  {id:'creative',name:'Creative',desc:'Asymmetric grid, oversized name, color-block section markers'},
];

/* Validation: a CV is "complete enough" to export */
function validateCV(cv){
  const issues=[];
  if(!cv.personal.fullName?.trim())issues.push('Add your full name');
  if(!cv.personal.title?.trim())issues.push('Add a professional title');
  if(!cv.personal.email?.trim())issues.push('Add an email address');
  if(cv.experience.length===0&&cv.education.length===0)issues.push('Add at least one experience or education entry');
  return issues;
}

/* ════════════════════════════════════════════════════════════
   GLOBAL STYLES — MOBILE FIRST
   Base rules target mobile (<768px). min-width queries layer
   on desktop/tablet enhancements. Touch targets ≥44px throughout.
════════════════════════════════════════════════════════════ */
const STYLES=`
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes progressFill{from{width:0%}}
@keyframes checkPop{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.anim-fade{animation:fadeIn 0.35s cubic-bezier(0.16,1,0.3,1) both}
.anim-slide{animation:slideIn 0.3s cubic-bezier(0.16,1,0.3,1) both}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:rgba(8,9,10,0.94);backdrop-filter:blur(16px);border-bottom:1px solid #252A2E;display:flex;align-items:center;padding:0 14px;gap:8px;z-index:300}
.nav-logo{display:flex;align-items:center;gap:9px;font-family:'JetBrains Mono',monospace;font-size:0.74rem;letter-spacing:0.05em;color:#E8EAEC;font-weight:500;min-width:0}
.nav-logo-txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-mark{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.nav-mark span{background:#7B9EC9;border-radius:1px;display:block}
.nav-spacer{flex:1;min-width:4px}
.nav-doc-name{font-family:var(--mono);font-size:0.66rem;color:var(--ash);letter-spacing:0.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:96px;display:none}
.nav-btn{padding:8px 12px;font-size:0.76rem;border-radius:6px;transition:all 0.2s;font-family:'JetBrains Mono',monospace;letter-spacing:0.03em;cursor:pointer;min-height:36px;display:flex;align-items:center;white-space:nowrap}
.nav-btn-ghost{color:#8A9099;background:none;border:none}
.nav-btn-ghost:hover{color:#E8EAEC;background:#1E2327}
.nav-btn-accent{background:#7B9EC9;color:#08090A;border:none;font-weight:500}
.nav-btn-accent:hover{background:#9BB8D9}
.nav-btn-outline{background:none;border:1px solid #252A2E;color:#C4C8CC}
.nav-btn-outline:hover{border-color:#2E3540;background:#161A1D}
@media(min-width:560px){.nav{padding:0 20px}.nav-doc-name{display:block}}
@media(min-width:768px){.nav{padding:0 24px}}

/* ── LANDING (mobile-first, scales up) ── */
.landing{min-height:100vh;padding-top:var(--nav-h)}
.hero{padding:40px 18px 48px;max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr;gap:36px}
@media(min-width:900px){.hero{grid-template-columns:1fr 1fr;gap:80px;align-items:center;padding:100px 48px 80px}}
.hero-h1{font-family:'Instrument Serif',serif;font-size:clamp(2rem,8vw,3.8rem);color:#E8EAEC;line-height:1.12;margin-bottom:16px}
.hero-h1 em{font-style:italic;color:#7B9EC9}
.hero-sub{font-size:0.95rem;line-height:1.8;color:#8A9099;margin-bottom:28px;max-width:480px}
@media(min-width:600px){.hero-sub{font-size:1.05rem}}
.hero-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn-primary{padding:13px 22px;background:#7B9EC9;color:#08090A;border:none;border-radius:8px;font-size:0.88rem;font-weight:500;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif;min-height:46px;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-primary:hover{background:#9BB8D9;transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0) scale(0.98)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-secondary{padding:13px 22px;background:none;border:1px solid #252A2E;color:#C4C8CC;border-radius:8px;font-size:0.88rem;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif;min-height:46px;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-secondary:hover{border-color:#2E3540;background:#161A1D}
.btn-secondary:disabled{opacity:0.5;cursor:not-allowed}
.hero-preview{background:#161A1D;border:1px solid #252A2E;border-radius:12px;overflow:hidden;box-shadow:0 24px 60px -20px rgba(0,0,0,0.8)}
.hp-bar{height:30px;background:#0E1012;border-bottom:1px solid #252A2E;display:flex;align-items:center;padding:0 12px;gap:6px}
.hp-dot{width:7px;height:7px;border-radius:50%}
.hp-body{padding:14px;display:grid;grid-template-columns:1fr;gap:12px;min-height:auto}
@media(min-width:480px){.hp-body{grid-template-columns:1fr 1.6fr;min-height:240px}}
@media(min-width:900px){.hp-body{padding:20px;gap:16px;min-height:280px}}
.hp-sidebar{display:flex;flex-direction:column;gap:8px}
.hp-field{background:#0E1012;border:1px solid #252A2E;border-radius:6px;padding:9px 11px}
.hp-field-lbl{font-family:'JetBrains Mono',monospace;font-size:0.48rem;letter-spacing:0.1em;text-transform:uppercase;color:#8A9099;margin-bottom:4px}
.hp-field-val{font-size:0.72rem;color:#E8EAEC}
.hp-preview-doc{background:#f5f6f8;border-radius:6px;padding:14px;font-family:'Instrument Serif',serif}
.hp-doc-name{font-size:1.02rem;color:#1a1d20;margin-bottom:2px}
.hp-doc-title{font-size:0.56rem;font-family:'JetBrains Mono',monospace;letter-spacing:0.08em;color:#7B9EC9;margin-bottom:9px}
.hp-doc-rule{height:1px;background:#dde0e3;margin-bottom:9px}
.hp-doc-sec{font-family:'Inter',sans-serif;font-size:0.52rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#999;margin-bottom:5px}
.hp-doc-line{height:4px;background:#e8eaec;border-radius:1px;margin-bottom:4px}
.hp-doc-line.s{width:60%}

/* ── FEATURES ── */
.features{max-width:1200px;margin:0 auto;padding:0 18px 56px}
@media(min-width:900px){.features{padding:0 48px 80px}}
.feat-label{font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:#7B9EC9;margin-bottom:14px}
.feat-h2{font-family:'Instrument Serif',serif;font-size:clamp(1.6rem,6vw,2.4rem);color:#E8EAEC;margin-bottom:32px;line-height:1.2}
@media(min-width:900px){.feat-h2{margin-bottom:48px}}
.feat-h2 em{font-style:italic;color:#9B8FC9}
.feat-grid{display:grid;grid-template-columns:1fr;gap:1px;background:#252A2E;border:1px solid #252A2E;border-radius:10px;overflow:hidden}
@media(min-width:640px){.feat-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:980px){.feat-grid{grid-template-columns:repeat(3,1fr)}}
.feat-item{background:#0E1012;padding:24px 20px;transition:background 0.2s}
@media(min-width:900px){.feat-item{padding:32px}}
.feat-item:hover{background:#161A1D}
.feat-num{font-family:'JetBrains Mono',monospace;font-size:0.58rem;letter-spacing:0.1em;color:#2E3540;margin-bottom:12px}
.feat-name{font-size:0.95rem;font-weight:500;color:#E8EAEC;margin-bottom:7px}
.feat-desc{font-size:0.8rem;line-height:1.7;color:#8A9099}

/* ── PRICING ── */
.pricing{max-width:1200px;margin:0 auto;padding:0 18px 64px}
@media(min-width:900px){.pricing{padding:0 48px 100px}}
.pricing-grid{display:grid;grid-template-columns:1fr;gap:16px;max-width:640px}
@media(min-width:560px){.pricing-grid{grid-template-columns:1fr 1fr}}
.plan-card{background:#0E1012;border:1px solid #252A2E;border-radius:12px;padding:24px 20px;transition:border-color 0.3s}
@media(min-width:900px){.plan-card{padding:32px}}
.plan-card.featured{border-color:#7B9EC9;position:relative}
.plan-card.featured::before{content:'PREMIUM';position:absolute;top:-1px;left:50%;transform:translateX(-50%);background:#7B9EC9;color:#08090A;font-family:'JetBrains Mono',monospace;font-size:0.52rem;letter-spacing:0.1em;padding:3px 12px;border-radius:0 0 6px 6px}
.plan-name{font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:#8A9099;margin-bottom:10px}
.plan-price{font-family:'Instrument Serif',serif;font-size:2.1rem;color:#E8EAEC;margin-bottom:4px}
.plan-price span{font-family:'Inter',sans-serif;font-size:0.8rem;color:#8A9099}
.plan-desc{font-size:0.8rem;color:#8A9099;margin-bottom:20px}
.plan-features{list-style:none;display:flex;flex-direction:column;gap:7px;margin-bottom:24px}
.plan-features li{font-size:0.8rem;color:#C4C8CC;display:flex;gap:8px;align-items:flex-start}
.plan-features li::before{content:'';width:4px;height:4px;background:#7B9EC9;border-radius:50%;flex-shrink:0;margin-top:6px}

/* ── DASHBOARD ── */
.dashboard{padding-top:var(--nav-h);min-height:100vh}
.dash-main{max-width:1100px;margin:0 auto;padding:28px 16px 48px}
@media(min-width:900px){.dash-main{padding:48px 32px}}
.dash-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:12px;flex-wrap:wrap}
@media(min-width:900px){.dash-header{margin-bottom:40px}}
.dash-title{font-family:'Instrument Serif',serif;font-size:1.5rem;color:#E8EAEC}
@media(min-width:900px){.dash-title{font-size:1.8rem}}
.dash-empty{text-align:center;padding:56px 20px}
@media(min-width:900px){.dash-empty{padding:80px 24px}}
.dash-empty-icon{font-size:2.6rem;margin-bottom:14px;opacity:0.2}
.dash-empty h3{font-family:'Instrument Serif',serif;font-size:1.25rem;color:#C4C8CC;margin-bottom:8px}
.dash-empty p{font-size:0.85rem;color:#8A9099;margin-bottom:22px}
.cv-grid{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:560px){.cv-grid{grid-template-columns:repeat(2,1fr);gap:18px}}
@media(min-width:900px){.cv-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}}
.cv-card{background:#0E1012;border:1px solid #252A2E;border-radius:10px;overflow:hidden;cursor:pointer;transition:all 0.25s}
.cv-card:hover{border-color:#2E3540}
@media(min-width:900px){.cv-card:hover{transform:translateY(-2px);box-shadow:0 16px 40px -20px rgba(0,0,0,0.6)}}
.cv-card-preview{height:120px;background:#161A1D;padding:12px;position:relative;overflow:hidden}
@media(min-width:900px){.cv-card-preview{height:140px;padding:14px}}
.cv-thumb{background:#f5f6f8;border-radius:3px;height:100%;padding:10px;display:flex;flex-direction:column;gap:4px}
.cv-thumb-name{font-family:'Instrument Serif',serif;font-size:0.7rem;color:#1a1d20}
.cv-thumb-role{font-family:'JetBrains Mono',monospace;font-size:0.42rem;color:#7B9EC9;letter-spacing:0.06em;margin-bottom:6px}
.cv-thumb-line{height:3px;background:#e5e7eb;border-radius:1px;margin-bottom:3px}
.cv-thumb-line.s{width:65%}
.cv-card-info{padding:13px 14px}
.cv-card-name{font-size:0.88rem;font-weight:500;color:#C4C8CC;margin-bottom:4px}
.cv-card-meta{font-family:'JetBrains Mono',monospace;font-size:0.58rem;letter-spacing:0.04em;color:#8A9099}
.cv-card-actions{display:flex;gap:6px;padding:0 14px 13px;opacity:1}
@media(min-width:900px){.cv-card-actions{opacity:0;transition:opacity 0.2s}.cv-card:hover .cv-card-actions{opacity:1}}
.cv-action-btn{padding:7px 11px;font-size:0.72rem;border-radius:5px;cursor:pointer;font-family:'JetBrains Mono',monospace;letter-spacing:0.03em;transition:all 0.15s;min-height:32px;display:flex;align-items:center}
.cv-action-edit{background:#7B9EC9;color:#08090A;border:none;font-weight:500}
.cv-action-dup{background:none;border:1px solid #252A2E;color:#8A9099}
.cv-action-dup:hover{border-color:#2E3540;color:#C4C8CC}
.cv-action-del{background:none;border:1px solid #252A2E;color:#8A9099}
.cv-action-del:hover{border-color:#E2655B;color:#E2655B}

/* ════════════════════════════════════════════════════════════
   BUILDER — MOBILE-FIRST ARCHITECTURE
   Mobile: tab bar nav (Edit/Preview/AI) + full-width single pane
   Desktop (≥1024px): sidebar | editor | preview, 3-col, no tabs
════════════════════════════════════════════════════════════ */
.builder{display:flex;flex-direction:column;height:100vh;padding-top:var(--nav-h);overflow:hidden}
.builder-body{flex:1;display:flex;overflow:hidden;min-height:0}

/* Mobile pane switching: only one of [nav/editor/preview] visible at a time */
.builder-nav{display:none}
.builder-editor{display:none;flex:1;overflow-y:auto;background:var(--charcoal);flex-direction:column;min-width:0}
.builder-preview{display:none;flex:1;background:var(--shadow);overflow-y:auto;flex-direction:column;min-width:0}
.builder-body.show-nav .builder-nav{display:flex}
.builder-body.show-editor .builder-editor{display:flex}
.builder-body.show-preview .builder-preview{display:flex}

.builder-nav{width:100%;flex-shrink:0;background:var(--shadow);border-right:1px solid var(--border);flex-direction:column;overflow-y:auto}
.bn-section{padding:18px 16px 8px;font-family:'JetBrains Mono',monospace;font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--border-hi)}
.bn-item{padding:12px 16px;font-size:0.88rem;color:var(--ash);cursor:pointer;border-radius:6px;margin:1px 8px;transition:all 0.15s;display:flex;align-items:center;gap:10px;min-height:44px}
.bn-item:hover{background:var(--graphite);color:var(--fog)}
.bn-item.active{background:var(--accent-g);color:var(--accent)}
.bn-item-dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:0.6;flex-shrink:0}

.editor-top{padding:14px 16px 0;border-bottom:1px solid var(--border);flex-shrink:0}
.editor-tabs{display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.editor-tabs::-webkit-scrollbar{display:none}
.etab{padding:11px 14px;font-size:0.7rem;cursor:pointer;border-bottom:2px solid transparent;color:var(--ash);transition:all 0.15s;font-family:'JetBrains Mono',monospace;letter-spacing:0.03em;white-space:nowrap;min-height:44px;display:flex;align-items:center}
.etab:hover{color:var(--fog)}
.etab.active{color:var(--accent);border-bottom-color:var(--accent)}
.editor-body{padding:18px 16px 90px}
@media(min-width:1024px){.editor-body{padding:24px 28px}}
.form-section{margin-bottom:28px}
.form-section-title{font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.form-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.form-row{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:12px}
@media(min-width:560px){.form-row{grid-template-columns:1fr 1fr}}
.form-row.full{grid-template-columns:1fr}
.form-field{display:flex;flex-direction:column;gap:5px;min-width:0}
.form-label{font-family:'JetBrains Mono',monospace;font-size:0.58rem;letter-spacing:0.07em;text-transform:uppercase;color:var(--ash)}
.form-input{background:var(--void);border:1px solid var(--border);border-radius:6px;padding:12px 13px;font-size:0.92rem;color:var(--ghost);outline:none;transition:border-color 0.2s;font-family:'Inter',sans-serif;min-height:46px;width:100%}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--border-hi)}
.form-textarea{background:var(--void);border:1px solid var(--border);border-radius:6px;padding:12px 13px;font-size:0.92rem;color:var(--ghost);outline:none;resize:vertical;min-height:96px;transition:border-color 0.2s;font-family:'Inter',sans-serif;line-height:1.6;width:100%}
.form-textarea:focus{border-color:var(--accent)}
.form-textarea::placeholder{color:var(--border-hi)}
.form-select{background:var(--void);border:1px solid var(--border);border-radius:6px;padding:12px 13px;font-size:0.92rem;color:var(--ghost);outline:none;cursor:pointer;font-family:'Inter',sans-serif;min-height:46px;width:100%}
.form-select:focus{border-color:var(--accent)}
.form-help{font-size:0.72rem;color:var(--ash);margin-top:2px;line-height:1.5}
.form-err{font-size:0.72rem;color:var(--red);margin-top:2px}

/* ════════════════════════════════════════════════════════════
   REAL PDF EXPORT ENGINE
   Renders the actual on-screen template DOM node (html2canvas)
   then places it into a jsPDF page sized to A4, preserving every
   template's real styling pixel-for-pixel. Single-click, no
   browser print dialog dependency.
════════════════════════════════════════════════════════════ */
async function renderNodeToPDF(node,filename,onProgress){
  onProgress?.(0.1);
  const canvas=await html2canvas(node,{
    scale:2.2,
    useCORS:true,
    backgroundColor:'#ffffff',
    logging:false,
    windowWidth:node.scrollWidth,
    windowHeight:node.scrollHeight,
  });
  onProgress?.(0.7);
  const imgData=canvas.toDataURL('image/jpeg',0.96);
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({unit:'mm',format:'a4',orientation:'portrait'});
  const pageW=210,pageH=297;
  const imgW=pageW;
  const imgH=(canvas.height*imgW)/canvas.width;
  if(imgH<=pageH){
    pdf.addImage(imgData,'JPEG',0,0,imgW,imgH);
  }else{
    /* paginate tall content across multiple A4 pages */
    let heightLeft=imgH,position=0,page=0;
    while(heightLeft>0){
      if(page>0)pdf.addPage();
      pdf.addImage(imgData,'JPEG',0,position,imgW,imgH);
      heightLeft-=pageH;
      position-=pageH;
      page++;
      if(page>8)break; /* safety cap */
    }
  }
  onProgress?.(0.95);
  pdf.save(filename);
  onProgress?.(1);
  return true;
}

/* Off-screen render: builds a detached, full-fidelity copy of the
   template at a fixed desktop width so mobile users still get a
   correctly-proportioned A4 PDF regardless of viewport size. */
function renderOffscreenAndExport(ReactComp,props,filename,onProgress){
  return new Promise((resolve,reject)=>{
    const host=document.createElement('div');
    host.style.position='fixed';
    host.style.left='-9999px';
    host.style.top='0';
    host.style.width='794px'; /* A4 @ 96dpi */
    host.style.background='#fff';
    document.body.appendChild(host);
    const root=ReactDOM.createRoot?ReactDOM.createRoot(host):null;
    const cleanup=()=>{try{document.body.removeChild(host)}catch{}};
    try{
      if(root){
        root.render(h(ReactComp,props));
        setTimeout(async()=>{
          try{
            await renderNodeToPDF(host.firstChild,filename,onProgress);
            cleanup();resolve(true);
          }catch(err){cleanup();reject(err)}
        },260); /* allow fonts/layout to settle */
      }else{
        ReactDOM.render(h(ReactComp,props),host);
        setTimeout(async()=>{
          try{
            await renderNodeToPDF(host.firstChild,filename,onProgress);
            cleanup();resolve(true);
          }catch(err){cleanup();reject(err)}
        },260);
      }
    }catch(err){cleanup();reject(err)}
  });
}

  /* ── PRODUCTION INTEGRATION POINT ─────────────────────────────
     Replace this function body with:

       const res = await fetch('/api/ai/cv-assist', {
         method:'POST',
         headers:{'Content-Type':'application/json'},
         body: JSON.stringify({ message, cv, history })
       });
       if(!res.ok) throw new Error('AI_REQUEST_FAILED');
       return await res.json(); // { reply, suggestion?: {field, value} }

     The API route (server-side, e.g. /api/ai/cv-assist.js) holds
     the ANTHROPIC_API_KEY as a server env var — never shipped to
     the client — and proxies to api.anthropic.com/v1/messages.
     ───────────────────────────────────────────────────────────── */
  await new Promise(r=>setTimeout(r,900+Math.random()*700));
  if(Math.random()<0.06)throw new Error('AI_REQUEST_FAILED');

  const lower=message.toLowerCase();
  const name=cv.personal.fullName||'there';
  if(lower.includes('summary')){
    const suggestion=`Results-driven ${cv.personal.title||'professional'} with a track record of delivering measurable impact through precision, ownership, and clear communication. Known for translating ambiguous problems into reliable outcomes.`;
    return{reply:`Here's a tighter, more confident summary for your profile:\n\n"${suggestion}"`,suggestion:{field:'summary',value:suggestion,label:'Apply to Summary'}};
  }
  if(lower.includes('experience')||lower.includes('stronger')){
    return{reply:`Strong experience bullets lead with an action verb and end with a measurable result. For example: "Led [project] resulting in [X% improvement / $Y saved / Z users reached]." Want me to rewrite a specific entry — just tell me which one.`};
  }
  if(lower.includes('skill')){
    return{reply:`Based on your title "${cv.personal.title||'your role'}", consider adding skills that pair a tool with an outcome (e.g. "Data Analysis (SQL)" rather than just "SQL") — ATS systems and recruiters both respond better to specificity.`};
  }
  if(lower.includes('confident')||lower.includes('tone')){
    return{reply:`To sound more confident: replace passive phrasing ("was responsible for") with direct ownership ("led", "built", "drove"). Avoid hedging words like "helped" or "assisted" unless the role was genuinely supportive.`};
  }
  if(lower.includes('ats')||lower.includes('keyword')){
    return{reply:`For ATS optimization: mirror exact phrasing from the job description for your title and top 5 skills, avoid tables/columns the parser might mangle, and keep section headers conventional ("Experience", "Education", "Skills").`};
  }
  return{reply:`Hi ${name} — I can help tighten your summary, strengthen experience bullets, suggest skills, or check ATS readiness. What would you like to start with?`};
}

const AI_PROMPTS=[
  'Improve my professional summary',
  'Make my experience descriptions stronger',
  'Suggest skills to add',
  'Rewrite in a more confident tone',
  'Check for ATS keywords',
];

function AIPanel({open,onClose,cv,onApply}){
  const [messages,setMessages]=useState([
    {role:'system',text:'I\'m your AI writing assistant. I can help improve your CV\'s impact, suggest stronger language, and optimize for ATS systems.'}
  ]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const messagesEndRef=useRef(null);
  const inputRef=useRef(null);

  useEffect(()=>{messagesEndRef.current?.scrollIntoView({behavior:'smooth'})},[messages,loading]);
  useEffect(()=>{if(open){setTimeout(()=>inputRef.current?.focus(),320)}},[open]);

  const send=async(text)=>{
    if(!text.trim()||loading)return;
    const userMsg={role:'user',text};
    const history=messages.filter(m=>m.role!=='system');
    setMessages(m=>[...m,userMsg]);
    setInput('');
    setLoading(true);
    try{
      const {reply,suggestion}=await callAIBackend({message:text,cv,history});
      setMessages(m=>[...m,{role:'ai',text:reply,suggestion}]);
    }catch(err){
      setMessages(m=>[...m,{role:'err',text:'Something went wrong reaching the AI assistant. Please check your connection and try again.'}]);
    }
    setLoading(false);
  };

  const retry=(text)=>send(text);

  return h(React.Fragment,null,
    h('div',{className:`ai-overlay-scrim${open?' open':''}`,onClick:onClose}),
    h('div',{className:`ai-panel${open?' open':''}`,role:'dialog','aria-label':'AI Writing Assistant','aria-hidden':!open},
      h('div',{className:'ai-drag-handle'},h('div',{className:'ai-drag-bar'})),
      h('div',{className:'ai-header'},
        h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},h('div',{className:'ai-dot'}),h('span',{className:'ai-header-title'},'AI Writing Assistant')),
        h('button',{className:'modal-close','aria-label':'Close AI panel',onClick:onClose},'×'),
      ),
      h('div',{className:'ai-body'},
        messages.map((m,i)=>h('div',{key:i},
          h('div',{className:`ai-msg ai-msg-${m.role}`,style:{whiteSpace:'pre-wrap'}},m.text),
          m.role==='err'&&h('button',{className:'ai-msg-apply',style:{color:'var(--amber)',borderColor:'rgba(217,168,87,0.3)',background:'rgba(217,168,87,0.1)'},onClick:()=>retry(messages[i-1]?.text||'')},'↻ Retry'),
          m.suggestion&&h('button',{className:'ai-msg-apply',onClick:()=>{onApply(m.suggestion.field,m.suggestion.value);}},'✓ '+m.suggestion.label),
        )),
        loading&&h('div',{className:'ai-msg ai-msg-ai'},h('span',{className:'ai-spinner'}),'Thinking…'),
        h('div',{ref:messagesEndRef}),
      ),
      h('div',{className:'ai-footer'},
        messages.length<=1&&h('div',{className:'ai-prompts'},
          AI_PROMPTS.map((p,i)=>h('button',{key:i,className:'ai-prompt-chip',onClick:()=>send(p)},p))
        ),
        h('div',{className:'ai-input-row'},
          h('input',{ref:inputRef,className:'ai-input',placeholder:'Ask anything about your CV…',value:input,onChange:e=>setInput(e.target.value),onKeyDown:e=>e.key==='Enter'&&send(input),disabled:loading,'aria-label':'Message to AI assistant'}),
          h('button',{className:'ai-send',onClick:()=>send(input),disabled:loading||!input.trim(),'aria-label':'Send message'},loading?h('span',{className:'ai-spinner',style:{margin:0,borderTopColor:'#08090A',borderColor:'rgba(8,9,10,0.25)'}}):'→'),
        )
      )
    )
  );
}

  const [genState,setGenState]=useState({status:'idle',step:0,progress:0,error:null,docName:''});
  const saveTimer=useRef(null);

  /* autosave, debounced */
  useEffect(()=>{
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      const updated={...cv,updatedAt:new Date().toISOString()};
      onSave(updated);
    },500);
    return ()=>clearTimeout(saveTimer.current);
  },[cv]);

  const update=(fn)=>setCV(prev=>fn(prev));

  const showToast=(msg)=>{setToastMsg(msg);setTimeout(()=>setToastMsg(''),2200)};

  const openAI=(seedPrompt)=>{setAiSeedMsg(seedPrompt||null);setAiOpen(true)};

  const applyAISuggestion=(field,value)=>{
    if(field==='summary'){update(c=>({...c,personal:{...c.personal,summary:value}}));showToast('Applied to Summary');}
  };

  /* ── Export flow ── */
  const runExport=async(kind)=>{
    setExportModalOpen(false);
    const filenameBase=(cv.personal.fullName||'CV').replace(/\s+/g,'_');
    setGenState({status:'running',step:0,progress:0,error:null,docName:kind==='resume'?`${filenameBase}_Resume.pdf`:`${filenameBase}_CoverLetter.pdf`});

    try{
      setGenState(s=>({...s,step:0,progress:0.08}));
      await new Promise(r=>setTimeout(r,420));
      setGenState(s=>({...s,step:1,progress:0.3}));
      await new Promise(r=>setTimeout(r,520)); /* ATS check beat */
      setGenState(s=>({...s,step:2,progress:0.55}));

      if(kind==='resume'){
        const Comp=TEMPLATE_COMPONENTS[cv.template]||CVPreviewModern;
        await renderOffscreenAndExport(Comp,{cv},`${filenameBase}_Resume.pdf`,(p)=>setGenState(s=>({...s,step:3,progress:0.55+p*0.4})));
      }else{
        await renderOffscreenAndExport(CoverLetterDoc,{cv},`${filenameBase}_CoverLetter.pdf`,(p)=>setGenState(s=>({...s,step:3,progress:0.55+p*0.4})));
      }
      setGenState(s=>({...s,status:'done',progress:1}));
    }catch(err){
      setGenState(s=>({...s,status:'error',error:'PDF generation failed. This can happen if the browser blocked a popup or ran out of memory. Please try again.'}));
    }
  };

  const ActiveForm=FORM_TABS.find(t=>t.key===activeTab)?.Comp||PersonalForm;
  const paneClass=`builder-body show-${mobilePane}`;

  return h('div',{className:'builder'},
    /* NAV */
    h('div',{className:'nav'},
      h('button',{className:'nav-btn nav-btn-ghost',onClick:onBack,'aria-label':'Back to dashboard',style:{paddingLeft:6,paddingRight:10}},'← Back'),
      h('div',{className:'nav-spacer'}),
      h('div',{className:'nav-doc-name'},cv.name),
      h('button',{className:'nav-btn nav-btn-ghost',onClick:()=>openAI(null)},'✨ AI'),
      h('button',{className:'nav-btn nav-btn-accent',onClick:()=>setExportModalOpen(true)},'Export'),
    ),

    h('div',{className:paneClass},
      /* DESKTOP SIDEBAR NAV (also visible as its own mobile pane if ever needed) */
      h('div',{className:'builder-nav'},
        h('div',{className:'bn-section'},'Sections'),
        FORM_TABS.map(t=>h('div',{key:t.key,className:`bn-item${activeTab===t.key?' active':''}`,onClick:()=>setActiveTab(t.key)},h('span',{className:'bn-item-dot'}),t.label)),
        h('div',{className:'bn-section'},'Document'),
        h('div',{className:'bn-item',onClick:()=>setTplModalOpen(true)},h('span',{className:'bn-item-dot'}),'Change Template'),
      ),

      /* EDITOR PANE */
      h('div',{className:'builder-editor'},
        h('div',{className:'editor-top'},
          h('div',{className:'editor-tabs'},
            FORM_TABS.map(t=>h('div',{key:t.key,className:`etab${activeTab===t.key?' active':''}`,onClick:()=>setActiveTab(t.key)},t.label))
          )
        ),
        h('div',{className:'editor-body'},
          h(ActiveForm,{cv,update,openAI}),
        ),
        h('div',{className:'editor-actionbar'},
          h('button',{className:'nav-btn nav-btn-outline',style:{flex:'1 1 auto'},onClick:()=>setTplModalOpen(true)},'🎨 Template: '+TEMPLATES.find(t=>t.id===cv.template)?.name),
        ),
      ),

      /* PREVIEW PANE */
      h('div',{className:'builder-preview'},
        h('div',{className:'preview-top'},
          h('span',{className:'preview-label'},'Live Preview'),
          h('div',{className:'preview-actions'},
            h('button',{className:'preview-action preview-action-template',onClick:()=>setTplModalOpen(true)},'Template'),
            h('button',{className:'preview-action preview-action-export',onClick:()=>setExportModalOpen(true)},'Export ↓'),
          )
        ),
        h('div',{className:'preview-paper-wrap'},h(CVPreview,{cv})),
      ),
    ),

    /* MOBILE BOTTOM TAB BAR */
    h('div',{className:'mobile-tabbar'},
      h('button',{className:`mtab${mobilePane==='editor'?' active':''}`,onClick:()=>setMobilePane('editor')},h('span',{className:'mtab-icon'},'✏️'),h('span',{className:'mtab-label'},'Edit')),
      h('button',{className:`mtab${mobilePane==='preview'?' active':''}`,onClick:()=>setMobilePane('preview')},h('span',{className:'mtab-icon'},'👁️'),h('span',{className:'mtab-label'},'Preview')),
      h('button',{className:'mtab',onClick:()=>openAI(null)},h('span',{className:'mtab-icon'},'✨'),h('span',{className:'mtab-label'},'AI'),h('span',{className:'mtab-badge'})),
      h('button',{className:'mtab',onClick:()=>setExportModalOpen(true)},h('span',{className:'mtab-icon'},'⬇️'),h('span',{className:'mtab-label'},'Export')),
    ),

    h(TemplateModal,{open:tplModalOpen,current:cv.template,onSelect:(id)=>{update(c=>({...c,template:id}));setTplModalOpen(false);showToast('Template changed');},onClose:()=>setTplModalOpen(false)}),
    h(ExportModal,{open:exportModalOpen,cv,onClose:()=>setExportModalOpen(false),onExport:runExport}),
    h(AIPanel,{open:aiOpen,onClose:()=>setAiOpen(false),cv,onApply:applyAISuggestion}),
    h(GenerationModal,{
      status:genState.status,activeStep:genState.step,progress:genState.progress,error:genState.error,docName:genState.docName,
      onClose:()=>setGenState(s=>({...s,status:'idle'})),
      onRetry:()=>{setGenState(s=>({...s,status:'idle'}));setExportModalOpen(true);},
    }),
    h('div',{className:`toast${toastMsg?' show':''}`,role:'status'},toastMsg),
  );
}

/* ════════════════════════════════════════════════════════════
   ROOT APP
════════════════════════════════════════════════════════════ */
function App(){
  const [view,setView]=useState('landing'); /* landing | dashboard | builder */
  const [cvs,setCVs]=useState(()=>store.get('cvs',[]));
  const [activeCVId,setActiveCVId]=useState(null);

  useEffect(()=>{store.set('cvs',cvs)},[cvs]);

  const createCV=()=>{
    const cv=blankCV();
    setCVs(prev=>[cv,...prev]);
    setActiveCVId(cv.id);
    setView('builder');
  };
  const openCV=(id)=>{setActiveCVId(id);setView('builder')};
  const duplicateCV=(id)=>{
    const src=cvs.find(c=>c.id===id);
    if(!src)return;
    const copy={...src,id:Date.now().toString(),name:src.name+' (copy)',updatedAt:new Date().toISOString()};
    setCVs(prev=>[copy,...prev]);
  };
  const deleteCV=(id)=>setCVs(prev=>prev.filter(c=>c.id!==id));
  const saveCV=(updated)=>setCVs(prev=>prev.map(c=>c.id===updated.id?updated:c));

  const activeCV=cvs.find(c=>c.id===activeCVId);

  if(view==='landing')return h(Landing,{onStart:()=>setView('dashboard')});
  if(view==='dashboard')return h(Dashboard,{cvs,onCreate:createCV,onOpen:openCV,onDuplicate:duplicateCV,onDelete:deleteCV,onBack:()=>setView('landing')});
  if(view==='builder'&&activeCV)return h(Builder,{cv:activeCV,onBack:()=>setView('dashboard'),onSave:saveCV});
  /* fallback if a stale activeCVId points to a deleted CV */
  setView('dashboard');
  return null;
}

const root=ReactDOM.createRoot?ReactDOM.createRoot(document.getElementById('root')):null;
if(root){root.render(h(App))}else{ReactDOM.render(h(App),document.getElementById('root'))}
</script>
